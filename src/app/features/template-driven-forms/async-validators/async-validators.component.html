<fieldset class="fieldset">
  <legend class="fieldset-legend">Nickname</legend>
  <input
    type="text"
    class="input"
    placeholder="Digite o Nickname"
    [(ngModel)]="nickName"
    #nickNameModel="ngModel"
    required
    appUniqueNickname
    minlength="6"
    [class.input-error]="nickNameModel.touched && nickNameModel.invalid" />
    <app-error-messages [control]="nickNameModel.control"></app-error-messages>
</fieldset>
